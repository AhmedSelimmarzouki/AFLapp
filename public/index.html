<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        canvas { touch-action: none; background: white; border: 2px solid #ccc; width: 100%; height: 300px; }
        .hidden { display: none; }
        
        /* THE CRITICAL FIX FOR LONG STRINGS */
        #qDisplay { 
            background: #1e3a8a; 
            color: white; 
            padding: 1rem; 
            border-radius: 0.5rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
            min-height: 50px;
            /* These three lines force the break */
            inline-size: 100%;
            overflow-wrap: break-word; 
            word-break: break-all;
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="p-4 bg-gray-100">
    <div id="login" class="max-w-md mx-auto bg-white p-6 rounded shadow-lg mt-10">
        <input id="room" type="text" placeholder="Room Code" class="w-full p-2 mb-2 border">
        <input id="name" type="text" placeholder="Name" class="w-full p-2 mb-4 border">
        <button onclick="join()" class="w-full bg-blue-600 text-white p-2 rounded">JOIN</button>
    </div>

    <div id="board" class="hidden max-w-md mx-auto">
        <div id="qDisplay">Waiting for teacher...</div>
        <div class="flex mb-2">
            <button onclick="setTool('type')" class="bg-gray-300 p-2 mr-2 rounded">TYPE</button>
            <button onclick="setTool('draw')" class="bg-gray-300 p-2 rounded">DRAW</button>
        </div>
        <div id="type-zone">
            <textarea id="textAns" class="w-full p-2 border" placeholder="Type answer..." oninput="send()"></textarea>
        </div>
        <div id="draw-zone" class="hidden">
            <canvas id="canvas"></canvas>
            <button onclick="clearC()" class="text-red-500 underline">Clear</button>
        </div>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function join() {
            const roomCode = document.getElementById('room').value;
            const name = document.getElementById('name').value;
            socket.emit('join-room', { roomCode, name });
            document.getElementById('login').classList.add('hidden');
            document.getElementById('board').classList.remove('hidden');
        }

        function setTool(t) {
            document.getElementById('type-zone').className = t==='type'?'':'hidden';
            document.getElementById('draw-zone').className = t==='draw'?'':'hidden';
            if(t==='draw') { 
                canvas.width = canvas.offsetWidth; 
                canvas.height = 300; 
                ctx.lineCap = 'round';
                ctx.lineWidth = 3;
            }
        }

        canvas.onmousedown = () => drawing = true;
        window.onmouseup = () => { if(drawing) { drawing = false; ctx.beginPath(); send(); } };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const r = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX-r.left, e.clientY-r.top);
            ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top);
        };

        function send() {
            const val = document.getElementById('draw-zone').classList.contains('hidden') 
                ? {type:'text', val: document.getElementById('textAns').value} 
                : {type:'draw', val: canvas.toDataURL()};
            socket.emit('send-math', val);
        }

        socket.on('new-question', (q) => { 
            document.getElementById('qDisplay').innerText = q.val; 
            ctx.clearRect(0,0,canvas.width,canvas.height);
            document.getElementById('textAns').value = "";
        });
    </script>
</body>
</html>
