<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Board</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/mathlive/dist/mathlive.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 10px; }
        #qDisplay { 
            background: #1e3a8a; color: white; padding: 15px; border-radius: 10px; 
            margin: 10px auto; max-width: 500px; text-align: left; font-weight: bold;
            white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word;
        }
        canvas { border: 2px solid #333; background: white; width: 100%; max-width: 450px; height: 300px; touch-action: none; border-radius: 8px; }
        .hidden { display: none; }
        .correct-bg { background: #dcfce7 !important; border: 5px solid #22c55e !important; border-radius: 15px; }
        .wrong-bg { background: #fee2e2 !important; border: 5px solid #ef4444 !important; border-radius: 15px; }
        math-field { width: 100%; font-size: 1.5rem; background: white; border: 1px solid #ccc; border-radius: 8px; }
        .btn { padding: 8px 12px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login">
        <h2>Join Math Room</h2>
        <input type="text" id="name" placeholder="Name" style="padding:10px; width:80%; margin-bottom:5px;"><br>
        <input type="text" id="room" placeholder="Room Code" style="padding:10px; width:80%;"><br>
        <button onclick="join()" style="background:blue; color:white; width:85%; margin-top:10px; padding:12px;">Join</button>
    </div>
    <div id="app" class="hidden">
        <div id="qDisplay">Waiting for teacher...</div>
        <div id="status-box" style="padding:10px;">
            <div style="margin-bottom:10px;">
                <button class="btn" onclick="setTool('type')">⌨️ TYPE</button>
                <button class="btn" onclick="setTool('draw')">✏️ DRAW</button>
            </div>
            <div id="type-zone"><math-field id="mf"></math-field></div>
            <div id="draw-zone" class="hidden">
                <canvas id="canvas"></canvas><br>
                <button class="btn" style="color:red;" onclick="ctx.clearRect(0,0,canvas.width,canvas.height); send()">Clear Canvas</button>
            </div>
        </div>
    </div>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mf = document.getElementById('mf');
        const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        let drawing = false;

        function join() {
            const room = document.getElementById('room').value;
            const name = document.getElementById('name').value;
            if(!room || !name) return alert("Fill both fields!");
            socket.emit('join-room', { roomCode: room, name: name });
            document.getElementById('login').className = 'hidden';
            document.getElementById('app').className = '';
        }

        function setTool(t) {
            document.getElementById('type-zone').className = t==='type'?'':'hidden';
            document.getElementById('draw-zone').className = t==='draw'?'':'hidden';
            if(t==='draw') { canvas.width = canvas.offsetWidth; canvas.height = 300; }
        }

        canvas.onmousedown = () => drawing = true;
        window.onmouseup = () => { if(drawing) { drawing = false; ctx.beginPath(); send(); } };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const r = canvas.getBoundingClientRect();
            ctx.lineWidth = 3; ctx.lineCap = 'round';
            ctx.lineTo((e.clientX-r.left)*(canvas.width/r.width), (e.clientY-r.top)*(300/r.height));
            ctx.stroke(); ctx.beginPath(); ctx.moveTo((e.clientX-r.left)*(canvas.width/r.width), (e.clientY-r.top)*(300/r.height));
        };

        mf.addEventListener('input', send);

        function send() {
            const val = document.getElementById('draw-zone').classList.contains('hidden') 
                ? {type:'text', val: mf.value} 
                : {type:'draw', val: canvas.toDataURL()};
            socket.emit('send-math', val);
        }

        socket.on('new-question', (q) => { 
            document.getElementById('qDisplay').innerText = q.val; 
            ctx.clearRect(0,0,canvas.width,canvas.height);
            mf.value = "";
            document.getElementById('status-box').className = "";
        });

        socket.on('receive-feedback', (status) => {
            const box = document.getElementById('status-box');
            box.className = status === 'correct' ? 'correct-bg' : 'wrong-bg';
            if(status === 'correct') winSound.play();
        });
    </script>
</body>
</html>
