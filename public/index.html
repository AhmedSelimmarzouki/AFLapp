<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 10px; }
        #question-box { background: white; padding: 15px; border-radius: 8px; margin: 10px auto; max-width: 500px; border-left: 5px solid #007bff; text-align: left; white-space: pre-wrap; word-wrap: break-word; font-weight: bold; }
        canvas { border: 2px solid #333; background: white; width: 100%; max-width: 500px; height: 350px; touch-action: none; }
        input { padding: 12px; margin: 5px; width: 80%; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 12px 20px; margin: 5px; border-radius: 5px; border: none; cursor: pointer; color: white; }
        .join-btn { background: #007bff; }
        .submit-btn { background: #28a745; }
        .clear-btn { background: #dc3545; }
    </style>
</head>
<body>
    <div id="login">
        <h2>Enter Math Room</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="room" placeholder="Room Code">
        <button class="join-btn" onclick="join()">Join</button>
    </div>
    <div id="app" style="display:none">
        <div id="question-box">Waiting for teacher...</div>
        <canvas id="canvas" width="500" height="350"></canvas><br>
        <button class="clear-btn" onclick="clearC()">Clear</button>
        <button class="submit-btn" onclick="send()">Submit</button>
    </div>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function join() {
            const room = document.getElementById('room').value;
            if(room) {
                socket.emit('join-room', room);
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        }

        canvas.onmousedown = () => drawing = true;
        window.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo((e.clientX-rect.left)*(500/rect.width), (e.clientY-rect.top)*(350/rect.height));
            ctx.stroke(); ctx.beginPath(); ctx.moveTo((e.clientX-rect.left)*(500/rect.width), (e.clientY-rect.top)*(350/rect.height));
        };

        function clearC() { ctx.clearRect(0,0,500,350); }
        function send() { socket.emit('drawing', { room: document.getElementById('room').value, drawing: canvas.toDataURL() }); alert("Sent!"); }
        socket.on('new-question', (q) => { document.getElementById('question-box').innerText = q; clearC(); });
    </script>
</body>
</html>
