<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 10px; }
        #qDisplay { 
            background: #1e3a8a; color: white; padding: 20px; border-radius: 10px; 
            margin: 10px auto; max-width: 90%; text-align: left; font-weight: bold;
            /* PARAGRAPH FIX */
            white-space: pre-wrap; 
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            word-break: break-word;
        }
        canvas { border: 2px solid #333; background: white; width: 100%; max-width: 500px; height: 350px; touch-action: none; }
        .hidden { display: none; }
        input { padding: 12px; margin: 5px; width: 80%; }
        button { padding: 12px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login">
        <h2>Join Room</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="room" placeholder="Room Code">
        <button onclick="join()">Join</button>
    </div>
    <div id="app" class="hidden">
        <div id="qDisplay">Waiting for teacher...</div>
        <div>
            <button onclick="setTool('type')">TYPE</button>
            <button onclick="setTool('draw')">DRAW</button>
        </div>
        <div id="type-zone">
            <textarea id="textAns" style="width:90%; height:100px;" oninput="send()"></textarea>
        </div>
        <div id="draw-zone" class="hidden">
            <canvas id="canvas"></canvas><br>
            <button onclick="ctx.clearRect(0,0,500,350); send()">Clear</button>
        </div>
    </div>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function join() {
            const room = document.getElementById('room').value;
            const name = document.getElementById('name').value;
            socket.emit('join-room', { roomCode: room, name: name });
            document.getElementById('login').className = 'hidden';
            document.getElementById('app').className = '';
        }

        function setTool(t) {
            document.getElementById('type-zone').className = t==='type'?'':'hidden';
            document.getElementById('draw-zone').className = t==='draw'?'':'hidden';
            if(t==='draw') { canvas.width = canvas.offsetWidth; canvas.height = 350; }
        }

        canvas.onmousedown = () => drawing = true;
        window.onmouseup = () => { if(drawing) { drawing = false; ctx.beginPath(); send(); } };
        canvas.onmousemove = (e) => {
            if(!drawing) return;
            const r = canvas.getBoundingClientRect();
            ctx.lineTo((e.clientX-r.left)*(500/r.width), (e.clientY-r.top)*(350/r.height));
            ctx.stroke(); ctx.beginPath(); ctx.moveTo((e.clientX-r.left)*(500/r.width), (e.clientY-r.top)*(350/r.height));
        };

        function send() {
            const val = document.getElementById('draw-zone').classList.contains('hidden') 
                ? {type:'text', val: document.getElementById('textAns').value} 
                : {type:'draw', val: canvas.toDataURL()};
            socket.emit('send-math', val);
        }

        socket.on('new-question', (q) => { 
            document.getElementById('qDisplay').innerText = q.val; 
            ctx.clearRect(0,0,canvas.width,canvas.height);
            document.getElementById('textAns').value = "";
        });
    </script>
</body>
</html>
