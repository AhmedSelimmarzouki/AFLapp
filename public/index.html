<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math AFL - Student View</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 10px; }
        #question-box { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 10px auto;
            max-width: 90%;
            border-left: 5px solid #007bff;
        }
        #question-display { 
            font-size: 1.4rem; 
            font-weight: bold;
            color: #333;
            /* FIX FOR LONG TEXT */
            white-space: pre-wrap;       
            word-wrap: break-word;   
            overflow-wrap: break-word;
            display: block;
            line-height: 1.5;
        }
        canvas { border: 2px solid #333; background: white; width: 100%; max-width: 500px; height: auto; touch-action: none; border-radius: 5px; }
        .btn { padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; font-size: 16px; }
        .submit-btn { background: #28a745; color: white; }
        .clear-btn { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2>Join Math Room</h2>
        <input type="text" id="name" placeholder="Your Name" style="padding:10px;"><br><br>
        <input type="text" id="room" placeholder="Room Code" style="padding:10px;"><br><br>
        <button class="btn submit-btn" onclick="join()">Join</button>
    </div>

    <div id="app" style="display:none;">
        <div id="question-box">
            <div id="question-display">Waiting for teacher...</div>
        </div>
        <canvas id="canvas" width="500" height="400"></canvas><br>
        <button class="btn clear-btn" onclick="clearCanvas()">Clear</button>
        <button class="btn submit-btn" onclick="send()">Submit Answer</button>
    </div>

    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        function join() {
            const name = document.getElementById('name').value;
            const room = document.getElementById('room').value;
            if(name && room) {
                socket.emit('joinRoom', { name, room });
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            }
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if(!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        });

        // Mobile touch support
        canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); }, {passive:false});
        canvas.addEventListener('touchmove', (e) => {
            if(!drawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
            e.preventDefault();
        }, {passive:false});
        canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function send() {
            const room = document.getElementById('room').value;
            socket.emit('drawing', { room, drawing: canvas.toDataURL() });
            alert("Sent!");
        }

        socket.on('newQuestion', (q) => {
            document.getElementById('question-display').innerText = q;
            clearCanvas();
        });
    </script>
</body>
</html>
