<!DOCTYPE html>
<html>
<head>
    <title>Teacher</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a202c; color: white; padding: 20px; }
        #grid { display: grid; grid-template-cols: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .card { background: white; color: black; padding: 10px; border-radius: 8px; }
        textarea { width: 100%; height: 80px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Teacher Room: <span id="rDisp"></span></h2>
    <textarea id="qIn" placeholder="Type question here..."></textarea>
    <button onclick="push()" style="width:100%; padding:15px; background:blue; color:white; font-bold;">PUSH TO STUDENTS</button>
    <div id="grid"></div>
    <script>
        const socket = io();
        const roomCode = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('rDisp').innerText = roomCode;
        socket.emit('join-room', { roomCode, name: 'Teacher' });

        function push() {
            socket.emit('send-question', { roomCode, question: {val: document.getElementById('qIn').value} });
        }

        socket.on('update-display', (data) => {
            let card = document.getElementById(data.id);
            if(!card) {
                card = document.createElement('div');
                card.id = data.id;
                card.className = "card";
                document.getElementById('grid').appendChild(card);
            }
            const content = data.math.type === 'draw' ? `<img src="${data.math.val}" style="width:100%">` : `<p>${data.math.val}</p>`;
            card.innerHTML = `<b>${data.name}</b><hr>${content}`;
        });
    </script>
</body>
</html>
